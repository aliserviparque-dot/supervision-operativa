<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supervision Operativa</title>
</head>
<body>

  <h1>Supervision Operativa</h1>

  <form id="formulario">
    <label>Supervisor</label><br>
    <input type="text" name="supervisor" required><br><br>

    <label>Area</label><br>
    <input type="text" name="area" value="Caja" required><br><br>

    <label>Empleado</label><br>
    <input type="text" name="empleado" required><br><br>

    <label>Caja</label><br>
    <input type="text" name="caja" required><br><br>

    <label>Pregunta</label><br>
    <input type="text" name="pregunta" value="El area de caja esta limpia y ordenada" required><br><br>

    <label>Respuesta</label><br>
    <select name="respuesta" id="respuesta" required>
      <option value="Si">Si</option>
      <option value="No">No</option>
      <option value="Observacion">Observacion</option>
    </select><br><br>

    <label>Foto</label><br>
    <input type="file" id="foto" accept="image/*"><br>
    <small>La foto es obligatoria si la respuesta es No.</small><br><br>

    <label>Observacion</label><br>
    <textarea name="observacion"></textarea><br><br>

    <button type="submit">Enviar</button>
  </form>

  <p id="mensaje"></p>

  <script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbygOG4m6WCO4PLRiGJrd6Q8uXisNBm6eCzIBh6b1xu5EZ2P-TiP-ZtHqSwmjtqSFABfMg/exec";

    const formulario = document.getElementById("formulario");
    const respuesta = document.getElementById("respuesta");
    const foto = document.getElementById("foto");
    const mensaje = document.getElementById("mensaje");

    respuesta.addEventListener("change", function() {
      foto.required = respuesta.value === "No";
    });

    formulario.addEventListener("submit", function(e) {
      e.preventDefault();

      if (respuesta.value === "No" && !foto.files.length) {
        mensaje.innerText = "Debe subir una foto cuando la respuesta es No.";
        return;
      }

      mensaje.innerText = "Enviando...";

      const datosFormulario = new FormData(formulario);
      const datos = new URLSearchParams();

      for (const [clave, valor] of datosFormulario.entries()) {
        datos.append(clave, valor);
      }

      const archivo = foto.files[0];

      if (archivo) {
        const lector = new FileReader();

        lector.onload = function() {
          datos.append("fotoBase64", lector.result);
          datos.append("fotoNombre", archivo.name);
          enviarDatos(datos);
        };

        lector.readAsDataURL(archivo);
      } else {
        enviarDatos(datos);
      }
    });

    function enviarDatos(datos) {
      fetch(URL_SCRIPT, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: datos.toString()
      });

      mensaje.innerText = "Supervision enviada. Revisa Google Sheets y el correo.";
      formulario.reset();
      foto.required = false;
    }
  </script>

</body>
</html>
