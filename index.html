<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supervision Operativa</title>
</head>
<body>

  <h1>Supervision Operativa</h1>

  <form id="formulario">
    <label>Supervisor</label><br>
    <input type="text" name="supervisor" required><br><br>

    <label>Area</label><br>
    <input type="text" name="area" value="Caja" required><br><br>

    <label>Empleado</label><br>
    <input type="text" name="empleado" required><br><br>

    <label>Caja</label><br>
    <input type="text" name="caja" required><br><br>

    <label>Pregunta</label><br>
    <input type="text" name="pregunta" value="El area de caja esta limpia y ordenada" required><br><br>

    <label>Respuesta</label><br>
    <select name="respuesta" required>
      <option value="Si">Si</option>
      <option value="No">No</option>
      <option value="Observacion">Observacion</option>
    </select><br><br>

    <label>Observacion</label><br>
    <textarea name="observacion"></textarea><br><br>

    <button type="submit">Enviar</button>
  </form>

  <p id="mensaje"></p>

  <script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbygOG4m6WCO4PLRiGJrd6Q8uXisNBm6eCzIBh6b1xu5EZ2P-TiP-ZtHqSwmjtqSFABfMg/exec";

    document.getElementById("formulario").addEventListener("submit", async function(e) {
      e.preventDefault();

      const datos = Object.fromEntries(new FormData(this).entries());
      const mensaje = document.getElementById("mensaje");

      mensaje.innerText = "Enviando...";

      try {
        await fetch(URL_SCRIPT, {
          method: "POST",
          body: JSON.stringify(datos)
        });

        mensaje.innerText = "Supervision enviada correctamente.";
        this.reset();
      } catch (error) {
        mensaje.innerText = "No se pudo enviar. Revisa la conexion o el Apps Script.";
      }
    });
  </script>

</body>
</html>
