<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supervision Operativa</title>
</head>
<body>

  <h1>Supervision Operativa</h1>

  <form
    action="https://script.google.com/macros/s/AKfycbygOG4m6WCO4PLRiGJrd6Q8uXisNBm6eCzIBh6b1xu5EZ2P-TiP-ZtHqSwmjtqSFABfMg/exec"
    method="POST"
    target="respuesta"
    onsubmit="document.getElementById('mensaje').innerText='Supervision enviada. Revisa Google Sheets y el correo.';"
  >
    <label>Supervisor</label><br>
    <input type="text" name="supervisor" required><br><br>

    <label>Area</label><br>
    <input type="text" name="area" value="Caja" required><br><br>

    <label>Empleado</label><br>
    <input type="text" name="empleado" required><br><br>

    <label>Caja</label><br>
    <input type="text" name="caja" required><br><br>

    <label>Pregunta</label><br>
    <input type="text" name="pregunta" value="El area de caja esta limpia y ordenada" required><br><br>

    <label>Respuesta</label><br>
    <select name="respuesta" required>
      <option value="Si">Si</option>
      <option value="No">No</option>
      <option value="Observacion">Observacion</option>
    </select><br><br>

    <label>Observacion</label><br>
    <textarea name="observacion"></textarea><br><br>

    <button type="submit">Enviar</button>
  </form>

  <iframe name="respuesta" style="display:none;"></iframe>

  <p id="mensaje"></p>

</body>
</html>
